services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-memory-server:local
    environment:
      - DATABASE_URL=sqlite:///data/db.sqlite
      - BIND_ADDR=0.0.0.0:8080
      - PUBLIC_URL=${PUBLIC_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - JWT_SIGNING_KEY_v1=${JWT_SIGNING_KEY_v1}
      - TRUSTED_PROXY_COUNT=${TRUSTED_PROXY_COUNT:-1}
      - MODEL_HAIKU=${MODEL_HAIKU:-claude-haiku-4-5-20251001}
      - MODEL_SONNET=${MODEL_SONNET:-claude-sonnet-4-6}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - data:/data
    expose:
      - "8080"
    restart: unless-stopped

  litestream:
    image: litestream/litestream:0.3.13
    # litestream.yml が `${LITESTREAM_BUCKET}` を参照するので、コンテナ環境に
    # 確実に注入する必要がある (compose の .env interpolation はファイルにしか効かない)。
    environment:
      - LITESTREAM_BUCKET=${LITESTREAM_BUCKET}
    command: ["replicate"]
    volumes:
      - data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    # GCE VM の instance service account を ADC で読むので、SA key ファイルは
    # マウントしない (gcp-sa.json をディスクに置く運用を避ける)。
    depends_on:
      - server
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    # HTTP/3 (UDP/443) は Claude Desktop には不要なので open しない。
    # tcp/80 は Let's Encrypt HTTP-01 challenge と http → https redirect 用。
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  data:
  caddy_data:
  caddy_config:
