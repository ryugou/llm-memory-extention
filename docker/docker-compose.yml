# GCE VM 上での運用を前提とした構成。Vertex AI / GCS の認証は VM の Instance
# Service Account を ADC (Application Default Credentials) 経由で利用する。
# ローカル PC で `docker compose up` する場合は、`~/.config/gcloud/application_default_credentials.json`
# を server / litestream container にマウントして `GOOGLE_APPLICATION_CREDENTIALS`
# を設定するアレンジが別途必要 (現状の compose は未対応)。
services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-memory-server:local
    # env_file は 2 つ列挙:
    # 1. `../.env`: 非 secret の app/deploy config (Vertex / PUBLIC_URL 等)
    # 2. `/dev/shm/llm-memory-secrets.env`: Secret Manager から fetch した
    #    OAuth client / JWT 鍵などの secret。`deploy/gce/run.sh` が起動時に
    #    tmpfs (/dev/shm) 上に書き、終了時に削除する。永続層に secret は残らない。
    #    ローカル開発で SM を使わない場合は `.env` に直書きすれば良いので
    #    `required: false` で optional 扱い (compose v2.24+ の機能)。
    # JWT key rotation (JWT_SIGNING_KEY_v1, v2, ...) は個別列挙不要。
    # container は std::env::vars() で `JWT_SIGNING_KEY_<kid>` を全列挙して読むので
    # env_file 経由でいくつ追加しても動作する。run.sh の SECRETS 配列に
    # `jwt-signing-key-vN:JWT_SIGNING_KEY_vN` を追加するだけ。
    # `.env` 例 / 必須 key の説明はリポジトリ root の `.env.example` 参照。
    env_file:
      - path: ../.env
        required: true
      - path: /dev/shm/llm-memory-secrets.env
        required: false
    # Docker 内固定値の上書き (env_file より優先される)。
    environment:
      - DATABASE_URL=sqlite:///data/db.sqlite
      - BIND_ADDR=0.0.0.0:8080
    volumes:
      - data:/data
    expose:
      - "8080"
    # gcp_auth crate が GCE Instance SA token を取得する際、metadata server
    # (169.254.169.254) を `metadata.google.internal` という FQDN で解決する。
    # docker bridge network 内では DNS では解決されないので、host エイリアスで
    # 169.254.169.254 を指す。これがないと VertexAi::new() で「ADC token fetch
    # failed」のエラーになる。
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    # 起動順を litestream → server に、停止順を server → litestream に固定する
    # (順序保証のみ)。litestream の終端 sync が成功するかは別問題で、graceful
    # shutdown (SIGTERM) なら litestream が最後の sync を実行するが、kill -9 や
    # OOM では `sync-interval` (5m) 分の write が GCS 未反映で失われ得る (= RPO 5m)。
    # ロス窓を縮めたければ `litestream.yml` の `sync-interval` を短くする
    # (例: 30s) — Litestream 0.3.x には push trigger サブコマンドが無いので
    # 定期 sync の間隔を絞るしかない。詳細は deploy/gce/README §11-1。
    depends_on:
      - litestream
    restart: unless-stopped

  litestream:
    image: litestream/litestream:0.3.13
    # litestream.yml が `${LITESTREAM_BUCKET}` を参照するので、コンテナ環境に
    # 確実に注入する必要がある (compose の .env interpolation はファイルにしか効かない)。
    environment:
      - LITESTREAM_BUCKET=${LITESTREAM_BUCKET}
    command: ["replicate"]
    volumes:
      - data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    # GCE VM の instance service account を ADC で読むので、SA key ファイルは
    # マウントしない (gcp-sa.json をディスクに置く運用を避ける)。
    # litestream も内部で gcloud SDK が metadata server を叩くので、server と
    # 同じ extra_hosts を追加する。
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    # HTTP/3 (UDP/443) は Claude Desktop には不要なので open しない。
    # tcp/80 は Let's Encrypt HTTP-01 challenge と http → https redirect 用。
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  data:
  caddy_data:
  caddy_config:
